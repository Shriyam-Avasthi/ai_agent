model_list:
  # 1. The Orchestrator (Fast, tool-calling expert)
  - model_name: orchestrator
    litellm_params:
      model: cerebras/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY
      rpm: 5
      # model: gemini/gemma-4-31b-it
      # api_key: os.environ/GEMINI_API_KEY
      # drop_params: true
      # rpm: 30
      tpm: 8000

  # 2. The Heavy Context Analyzer (1M Token Window)
  - model_name: heavy-context
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # 3. The Local Worker (Diff generation, strict privacy)
  - model_name: local-coder
    litellm_params:
      model: ollama/qwen2.5-coder:7b-instruct-q4_K_M
      api_base: os.environ/OLLAMA_API_BASE

  # 4. The Deep Reasoner (Free tier DeepSeek V3 via OpenRouter)
  - model_name: deep-reasoning
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY

  # 2. The Heavy Context Analyzer (1M Token Window)
  - model_name: lightweight-helper
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

